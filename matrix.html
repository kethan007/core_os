<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kethan's Website // The Matrix</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='40' fill='%23ffaa33' /%3E%3C/svg%3E">
    <style>
        /* =========================================
           ULTRA-GLOSSY MATRIX SUBSYSTEM
           ========================================= */
        :root {
            --bg-base: #050404;
            --text-main: #ffffff;
            --text-muted: #a39589;
            --accent: #ffaa33;
            --danger: #d46a6a;
            --success: #6ad48a;

            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-highlight: rgba(255, 255, 255, 0.35);
            --glass-noise: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E");

            --ease-smooth: cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .mono {
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- AMBIENT LIGHTS --- */
        .ambient-glow {
            position: fixed;
            top: 10%;
            right: 20%;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(255, 170, 50, 0.3) 0%, transparent 60%);
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
        }

        .glow-2 {
            top: 50%;
            left: -10%;
            right: auto;
            background: radial-gradient(circle, rgba(255, 100, 0, 0.2) 0%, transparent 60%);
        }

        /* --- NAVIGATION --- */
        .internal-nav {
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(5, 4, 4, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            background: transparent;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
            color: var(--text-muted);
            transition: color 0.3s ease;
        }

        .back-btn:hover {
            color: var(--text-main);
        }

        .breadcrumbs {
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .bc-active {
            color: var(--accent);
        }

        /* --- MAIN WORKSPACE --- */
        .workspace {
            max-width: 1000px;
            margin: 0 auto;
            padding: 4rem 5% 8rem 5%;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 4rem;
        }

        .page-title {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 300;
            letter-spacing: -0.03em;
            margin-bottom: 0.5rem;
            text-align: center;
            text-shadow: 0 4px 30px rgba(0, 0, 0, 0.8);
        }

        .page-subtitle {
            text-align: center;
            color: var(--accent);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 3rem;
        }

        /* --- GLOSSY PANELS --- */
        .panel {
            background:
                radial-gradient(circle at 100% 0%, rgba(255, 170, 50, 0.15) 0%, transparent 60%),
                linear-gradient(rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.02)),
                var(--glass-noise);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid var(--glass-border);
            border-top: 1px solid var(--glass-highlight);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), inset 0 1px 1px rgba(255, 255, 255, 0.4);
            border-radius: 24px;
            padding: 2.5rem;
            transition: all 0.4s var(--ease-smooth);
            position: relative;
        }

        .panel:hover {
            border-color: rgba(255, 255, 255, 0.4);
            background:
                radial-gradient(circle at 100% 0%, rgba(255, 170, 50, 0.25) 0%, transparent 70%),
                linear-gradient(rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.04)),
                var(--glass-noise);
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.9), inset 0 2px 2px rgba(255, 255, 255, 0.6);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1rem;
            color: var(--text-main);
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 1rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0.9;
        }

        /* --- LIST ITEMS --- */
        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border: 1px solid var(--glass-border);
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .list-item:hover {
            border-color: rgba(255, 255, 255, 0.4);
            background: radial-gradient(circle at bottom, rgba(255, 170, 50, 0.2) 0%, rgba(255, 255, 255, 0.06) 100%);
            transform: scale(1.04) translateY(-4px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.3);
        }

        .item-name {
            font-size: 1rem;
            font-weight: 400;
            flex: 1;
            transition: 0.3s;
        }

        .item-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-left: 10px;
        }

        .list-item.done {
            opacity: 0.5;
            border-color: transparent;
            box-shadow: none;
        }

        .list-item.done .item-name {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .list-item.done:hover {
            transform: none;
        }

        /* Glass Checkbox */
        .glass-check {
            width: 24px;
            height: 24px;
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            margin-right: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.2s;
            background: rgba(0, 0, 0, 0.3);
            cursor: pointer;
            flex-shrink: 0;
        }

        .glass-check:hover {
            border-color: var(--accent);
        }

        .glass-check.checked {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(212, 154, 106, 0.5);
        }

        .glass-check.checked::after {
            content: '✓';
            color: #000;
            font-size: 0.9rem;
            font-weight: bold;
        }

        /* --- INPUT BARS (BOTTOM ANCHORED) --- */
        .input-bar {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
        }

        .glass-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 0.95rem;
            outline: none;
            transition: 0.3s;
            backdrop-filter: blur(10px);
        }

        .glass-input:focus {
            border-color: var(--accent);
            background: rgba(0, 0, 0, 0.5);
        }

        .glass-select {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 0 15px;
            border-radius: 12px;
            outline: none;
            cursor: pointer;
        }

        .glass-select option {
            background: #0a0807;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 0 24px;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.2s;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .action-btn:hover {
            border-color: var(--accent);
            background: var(--accent);
            color: black;
            transform: scale(1.05);
        }

        /* --- GLOSSY TOGGLE SWITCH --- */
        .glass-toggle {
            display: flex;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 4px;
            position: relative;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .toggle-btn {
            flex: 1;
            padding: 8px 20px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            border-radius: 25px;
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            z-index: 2;
        }

        .toggle-btn.active {
            color: #000;
        }

        .toggle-pill {
            position: absolute;
            top: 4px;
            left: 4px;
            height: calc(100% - 8px);
            width: calc(50% - 4px);
            background: var(--accent);
            border-radius: 25px;
            transition: transform 0.4s var(--ease-smooth);
            z-index: 1;
            box-shadow: 0 2px 10px rgba(212, 154, 106, 0.4);
        }

        .toggle-state-media .toggle-pill {
            transform: translateX(100%);
        }

        /* --- CONSUMPTION SECTIONS --- */
        .sub-header {
            font-size: 0.8rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin: 1.5rem 0 1rem 0;
            font-weight: 600;
        }

        .archive-toggle {
            width: 100%;
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 12px;
            border-radius: 12px;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .archive-toggle:hover {
            border-color: rgba(255, 255, 255, 0.3);
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.02);
        }

        .archive-vault {
            display: none;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
        }

        .archive-vault.open {
            display: block;
            animation: slideDown 0.4s var(--ease-smooth);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Deletion Buttons */
        .del-btn {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.2);
            cursor: pointer;
            font-size: 1.2rem;
            margin-left: 15px;
            transition: 0.2s;
        }

        .list-item:hover .del-btn {
            color: var(--danger);
        }
    </style>
</head>

<body>

    <div class="ambient-glow"></div>
    <div class="ambient-glow glow-2"></div>

    <nav class="internal-nav">
        <button class="back-btn" onclick="window.location.href='index.html'">← Main OS</button>
        <div class="breadcrumbs bc-active">The Matrix</div>
        <div style="width: 70px;"></div>
    </nav>

    <main class="workspace">

        <header>
            <h1 class="page-title">Logs & Matrix</h1>
            <div class="page-subtitle">Execution & Consumption</div>
        </header>

        <div class="panel">
            <div class="panel-header">
                <span>Task Execution</span>
                <span class="mono" style="font-size: 0.75rem; color: var(--text-muted);" id="task-counter">0
                    Active</span>
            </div>

            <div id="task-list">
            </div>

            <div class="input-bar">
                <input type="text" class="glass-input" id="new-task-input" placeholder="Initialize new task..."
                    onkeypress="handleTaskEnter(event)">
                <button class="action-btn" onclick="addTask()">Push</button>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                <span>Consumption Engine</span>

                <div class="glass-toggle" id="media-toggle">
                    <div class="toggle-pill"></div>
                    <button class="toggle-btn active" onclick="switchMedia('books')" id="btn-books">Library</button>
                    <button class="toggle-btn" onclick="switchMedia('media')" id="btn-media">Theater</button>
                </div>
            </div>

            <div id="consumption-container">
                <div class="sub-header" id="ongoing-header">Currently Consuming</div>
                <div id="cons-ongoing-list"></div>

                <div class="sub-header" style="margin-top: 2rem;">Bucket List</div>
                <div id="cons-bucket-list"></div>

                <div class="input-bar">
                    <input type="text" class="glass-input" id="new-cons-input" placeholder="Add title..."
                        onkeypress="handleConsEnter(event)">
                    <input type="text" class="glass-input" id="new-cons-author" placeholder="Creator / Author..."
                        style="flex: 0.5;">
                    <select class="glass-select" id="new-cons-type">
                        <option value="bucket">To Bucket List</option>
                        <option value="ongoing">To Ongoing</option>
                    </select>
                    <button class="action-btn" onclick="addConsumption()">Log</button>
                </div>

                <button class="archive-toggle" onclick="toggleArchive()" id="archive-btn">View Archived Records</button>
                <div class="archive-vault" id="archive-vault">
                    <div class="sub-header" style="margin-top: 0;">Completed Data</div>
                    <div id="cons-done-list"></div>
                </div>
            </div>
        </div>

    </main>

    <script>
        /* ==========================================================
           STATE MANAGEMENT & DATA
           ========================================================== */

        // Load Tasks from LocalStorage to sync with index.html natively
        let tasks = JSON.parse(localStorage.getItem('core_os_daily_tasks')) || [
            { text: "Submit Project Schema", done: false },
            { text: "Review GATE aptitude", done: false },
            { text: "Calibrate IMU sensor", done: true }
        ];

        let consumption = {
            books: {
                ongoing: [{ id: 'b1', title: 'Dark Matter', author: 'Blake Crouch' }],
                bucket: [{ id: 'b2', title: 'Recursion', author: 'Blake Crouch' }],
                done: [{ id: 'b3', title: 'The Count of Monte Cristo', author: 'Alexandre Dumas' }]
            },
            media: {
                ongoing: [{ id: 'm1', title: 'Drive to Survive', author: 'Formula 1 / Netflix' }],
                bucket: [{ id: 'm2', title: 'F1 The Movie', author: 'Apple' }],
                done: []
            }
        };

        let currentMedia = 'books'; // 'books' or 'media'
        let archiveOpen = false;

        function generateId() { return '_' + Math.random().toString(36).substr(2, 9); }

        /* ==========================================================
           TASK ENGINE LOGIC
           ========================================================== */

        function renderTasks() {
            const container = document.getElementById('task-list');
            container.innerHTML = '';

            let activeCount = 0;

            // Sort: Undone first, Done at the bottom
            const sortedTasks = [...tasks].sort((a, b) => a.done - b.done);

            sortedTasks.forEach(task => {
                if (!task.done) activeCount++;
                const originalIndex = tasks.indexOf(task);
                container.innerHTML += `
                    <div class="list-item ${task.done ? 'done' : ''}">
                        <div class="glass-check ${task.done ? 'checked' : ''}" onclick="toggleTask(${originalIndex})"></div>
                        <span class="item-name">${task.text}</span>
                        <button class="del-btn" onclick="deleteTask(${originalIndex})">×</button>
                    </div>
                `;
            });

            document.getElementById('task-counter').innerText = `${activeCount} Active`;

            saveTasks();
        }

        function saveTasks() {
            localStorage.setItem('core_os_daily_tasks', JSON.stringify(tasks));
            if (typeof notifySyncEngineOfChange === 'function') notifySyncEngineOfChange();
        }

        function toggleTask(index) {
            tasks[index].done = !tasks[index].done;
            renderTasks();
        }

        function addTask() {
            const input = document.getElementById('new-task-input');
            const text = input.value.trim();
            if (!text) return;

            tasks.unshift({ text: text, done: false });
            input.value = '';
            renderTasks();
        }

        function handleTaskEnter(e) { if (e.key === 'Enter') addTask(); }

        function deleteTask(index) {
            tasks.splice(index, 1);
            renderTasks();
        }

        /* ==========================================================
           CONSUMPTION ENGINE LOGIC
           ========================================================== */

        function switchMedia(type) {
            currentMedia = type;
            const toggleObj = document.getElementById('media-toggle');

            if (type === 'books') {
                toggleObj.classList.remove('toggle-state-media');
                document.getElementById('btn-books').classList.add('active');
                document.getElementById('btn-media').classList.remove('active');
            } else {
                toggleObj.classList.add('toggle-state-media');
                document.getElementById('btn-books').classList.remove('active');
                document.getElementById('btn-media').classList.add('active');
            }
            renderConsumption();
        }

        function renderConsumption() {
            const data = consumption[currentMedia];

            const renderList = (arr, containerId, isDone) => {
                const container = document.getElementById(containerId);
                container.innerHTML = '';
                arr.forEach(item => {
                    const icon = currentMedia === 'books' ? '📖' : '🎬';
                    let actionBtn = isDone
                        ? ''
                        : `<div class="glass-check" onclick="markConsDone('${item.id}', '${containerId.includes('ongoing') ? 'ongoing' : 'bucket'}')" title="Mark as Finished"></div>`;

                    container.innerHTML += `
                        <div class="list-item ${isDone ? 'done' : ''}">
                            ${actionBtn}
                            <span class="item-name">${item.title} <span class="item-meta">// ${item.author}</span></span>
                            <span class="mono" style="font-size:1.2rem; opacity:0.3;">${icon}</span>
                            <button class="del-btn" onclick="deleteCons('${item.id}', '${isDone ? 'done' : containerId.includes('ongoing') ? 'ongoing' : 'bucket'}')">×</button>
                        </div>
                    `;
                });
                if (arr.length === 0) container.innerHTML = `<div class="item-meta" style="padding:10px;">Queue empty.</div>`;
            };

            renderList(data.ongoing, 'cons-ongoing-list', false);
            renderList(data.bucket, 'cons-bucket-list', false);
            renderList(data.done, 'cons-done-list', true);

            // Update Archive Button Text
            const arcBtn = document.getElementById('archive-btn');
            arcBtn.innerText = archiveOpen ? "Close Archival Vault" : `View Archived Records (${data.done.length})`;
        }

        function toggleArchive() {
            archiveOpen = !archiveOpen;
            const vault = document.getElementById('archive-vault');
            if (archiveOpen) vault.classList.add('open');
            else vault.classList.remove('open');
            renderConsumption(); // to update button text
        }

        function markConsDone(id, listType) {
            const data = consumption[currentMedia];
            const itemIndex = data[listType].findIndex(i => i.id === id);
            if (itemIndex > -1) {
                const item = data[listType].splice(itemIndex, 1)[0];
                data.done.unshift(item);

                // Auto-open archive to show it moved
                if (!archiveOpen) toggleArchive();
                else renderConsumption();
            }
        }

        function addConsumption() {
            const titleInput = document.getElementById('new-cons-input');
            const authorInput = document.getElementById('new-cons-author');
            const targetList = document.getElementById('new-cons-type').value;

            const title = titleInput.value.trim();
            const author = authorInput.value.trim() || 'Unknown';
            if (!title) return;

            consumption[currentMedia][targetList].push({
                id: generateId(),
                title: title,
                author: author
            });

            titleInput.value = '';
            authorInput.value = '';
            renderConsumption();
        }

        function handleConsEnter(e) { if (e.key === 'Enter') addConsumption(); }

        function deleteCons(id, listType) {
            consumption[currentMedia][listType] = consumption[currentMedia][listType].filter(i => i.id !== id);
            renderConsumption();
        }

        // Initialize App
        window.onCloudSyncData = function () {
            tasks = JSON.parse(localStorage.getItem('core_os_daily_tasks')) || [];
            renderTasks();
        };

        // Initialize System
        renderTasks();
        renderConsumption();

    </script>
    <script src="sync.js"></script>
</body>

</html>
