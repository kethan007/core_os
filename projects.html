<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORE_OS // Projects Hub</title>
    <style>
        /* =========================================
           ULTRA-GLOSSY PROJECTS HUB v3.0
           ========================================= */
        :root {
            --bg-base: #050404; 
            --text-main: #ffffff; 
            --text-muted: #a39589;
            --accent: #d49a6a; 
            --danger: #d46a6a;
            --success: #6ad48a;
            --future: #8da4d1; /* Soft blue for future */
            
            --glass-bg: rgba(255, 255, 255, 0.015);
            --glass-border: rgba(255, 255, 255, 0.12);
            --ease-smooth: cubic-bezier(0.25, 1, 0.5, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing: antialiased; }
        .mono { font-family: 'Courier New', Courier, monospace; }

        body { background-color: var(--bg-base); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

        /* --- AMBIENT LIGHTS --- */
        .ambient-glow { position: fixed; top: 10%; right: 10%; width: 40vw; height: 40vw; background: radial-gradient(circle, rgba(212, 154, 106, 0.15) 0%, transparent 60%); filter: blur(80px); z-index: 0; pointer-events: none; }
        .glow-2 { top: 40%; left: -10%; right: auto; background: radial-gradient(circle, rgba(60, 90, 140, 0.1) 0%, transparent 60%); }

        /* --- NAVIGATION --- */
        .internal-nav {
            padding: 1.5rem 5%; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(5, 4, 4, 0.5); backdrop-filter: blur(30px) saturate(150%); -webkit-backdrop-filter: blur(30px) saturate(150%);
            position: sticky; top: 0; z-index: 100;
        }
        .back-btn { background: transparent; border: none; font-size: 0.9rem; cursor: pointer; color: var(--text-muted); transition: color 0.3s ease; }
        .back-btn:hover { color: var(--text-main); }
        .breadcrumbs { font-size: 0.85rem; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; display: flex; align-items: center; justify-content: center;}
        .bc-link { color: var(--text-muted); cursor: pointer; transition: color 0.2s; padding: 4px 8px; border-radius: 6px; }
        .bc-link:hover { color: var(--text-main); background: rgba(255,255,255,0.05); }
        .bc-active { color: var(--accent); }
        .bc-sep { margin: 0 4px; color: rgba(255,255,255,0.2); }

        /* --- MAIN WORKSPACE --- */
        .workspace { max-width: 1400px; margin: 0 auto; padding: 4rem 5% 8rem 5%; position: relative; z-index: 10; }
        .view-layer { display: none; opacity: 0; transform: translateY(20px); transition: all 0.4s var(--ease-smooth); }
        .view-layer.active { display: block; opacity: 1; transform: translateY(0); }

        .page-title { font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 300; letter-spacing: -0.03em; margin-bottom: 1rem; text-align: center; text-shadow: 0 4px 30px rgba(0,0,0,0.8); }
        .page-subtitle { text-align: center; color: var(--accent); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 3rem; }

        .section-header { font-size: 1rem; color: var(--text-muted); margin-bottom: 1.5rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; }

        /* --- HORIZONTAL TRACK SCROLLING --- */
        .horizontal-track {
            display: flex; gap: 2rem; overflow-x: auto; padding-bottom: 2rem; padding-top: 10px;
            scroll-snap-type: x mandatory; scroll-behavior: smooth;
        }
        .horizontal-track::-webkit-scrollbar { height: 8px; }
        .horizontal-track::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); border-radius: 10px; }
        .horizontal-track::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .horizontal-track::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        /* --- GLOSSY PANELS (CARDS & WINDOWS) --- */
        .glass-card {
            background: var(--glass-bg); backdrop-filter: blur(40px) saturate(200%); -webkit-backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid var(--glass-border); border-top: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            border-radius: 24px; padding: 2rem; transition: all 0.4s var(--ease-smooth);
            min-width: 350px; flex-shrink: 0; scroll-snap-align: start; cursor: pointer; position: relative; overflow: hidden;
            display: flex; flex-direction: column;
        }
        .glass-card:hover { border-color: rgba(255,255,255,0.3); background: rgba(255, 255, 255, 0.04); transform: translateY(-4px); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        .card-title { font-size: 1.4rem; font-weight: 400; margin-bottom: 10px; color: var(--text-main); }
        .card-desc { font-size: 0.9rem; color: var(--text-muted); line-height: 1.5; flex: 1; }
        .card-date { font-size: 0.75rem; color: var(--accent); margin-top: 20px; font-family: monospace; letter-spacing: 0.1em; }

        /* Project Windows (Inner Columns) */
        .window-panel {
            background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(30px); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 1.5rem; min-width: 400px; flex-shrink: 0; scroll-snap-align: start; display: flex; flex-direction: column;
        }
        .window-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; margin-bottom: 15px; }
        .window-title { font-size: 1.1rem; font-weight: 500; color: var(--accent); letter-spacing: 0.05em; text-transform: uppercase; }

        /* Items inside Windows */
        .res-item { 
            display: flex; align-items: center; gap: 12px; padding: 14px; border: 1px solid rgba(255,255,255,0.05); 
            background: rgba(255,255,255,0.02); margin-bottom: 8px; border-radius: 12px; transition: 0.2s;
        }
        .res-item:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.15); transform: translateX(4px); }
        .res-icon { font-size: 1.2rem; }
        .res-info { flex: 1; display: flex; flex-direction: column; }
        .res-name { font-size: 0.95rem; }
        .res-meta { font-size: 0.7rem; color: var(--text-muted); margin-top: 4px; }
        
        .view-btn { background: rgba(255,255,255,0.1); border: none; color: white; padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; transition: 0.2s; font-weight: 500;}
        .view-btn:hover { background: var(--accent); color: black; }

        /* Grid for Completed Projects */
        .grid-completed { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem; }
        .grid-completed .glass-card { min-width: auto; }

        /* --- EDIT MODE CONTROLS --- */
        .edit-controls { display: none; gap: 8px; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--glass-border); justify-content: flex-start;}
        .edit-mode .edit-controls { display: flex; }
        .edit-mode .glass-card:hover { transform: none; box-shadow: none; }
        .edit-mode .view-btn { display: none; }
        
        .item-edit-controls { display: none; gap: 6px; }
        .edit-mode .item-edit-controls { display: flex; }

        .btn-icon { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: var(--text-main); border-radius: 8px; width: 32px; height: 32px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: all 0.2s; font-size: 0.9rem;}
        .btn-icon:hover { background: rgba(255,255,255,0.15); transform: scale(1.05); }
        
        /* Contextual Status Colors */
        .btn-icon.del:hover { background: rgba(212, 106, 106, 0.3); border-color: var(--danger); color: var(--danger); }
        .btn-icon.success:hover { background: rgba(106, 212, 138, 0.3); border-color: var(--success); color: var(--success); }
        .btn-icon.future:hover { background: rgba(141, 164, 209, 0.3); border-color: var(--future); color: var(--future); }

        .add-btn { width: 100%; padding: 16px; margin-top: 10px; background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.2); color: var(--text-muted); border-radius: 16px; cursor: pointer; transition: all 0.2s; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.1em; display: none; justify-content: center; align-items: center; gap: 10px; }
        .edit-mode .add-btn { display: flex; }
        .add-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-main); border-color: var(--accent); }
        
        .add-card-btn { min-width: 300px; display: none; flex-direction: column; justify-content: center; align-items: center; background: transparent; border: 2px dashed rgba(255,255,255,0.2); color: var(--text-muted); border-radius: 24px; font-size: 1.1rem; cursor: pointer; transition: 0.3s; scroll-snap-align: start; }
        .edit-mode .add-card-btn { display: flex; }
        .add-card-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(212, 154, 106, 0.05); }

        /* --- CUSTOM GLASS MODAL --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); z-index: 9999; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-box { background: rgba(15, 12, 11, 0.8); backdrop-filter: blur(50px) saturate(200%); border: 1px solid rgba(255,255,255,0.15); border-top: 1px solid rgba(255,255,255,0.3); box-shadow: 0 30px 60px rgba(0,0,0,0.8); border-radius: 24px; padding: 2.5rem; width: 90%; max-width: 450px; transform: translateY(20px) scale(0.95); transition: all 0.3s var(--ease-smooth); }
        .modal-overlay.active .modal-box { transform: translateY(0) scale(1); }
        
        .modal-title { font-weight: 300; font-size: 1.5rem; margin-bottom: 1.5rem; text-align: center; }
        .modal-input, .modal-select { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); color: white; padding: 14px; border-radius: 12px; font-size: 1rem; margin-bottom: 1rem; outline: none; transition: border 0.2s; -webkit-appearance: none; }
        .modal-input:focus, .modal-select:focus { border-color: var(--accent); }
        .modal-select { cursor: pointer; }
        .modal-select option { background: #0a0807; color: white; }
        
        .file-drop-area { border: 2px dashed rgba(255,255,255,0.2); border-radius: 12px; padding: 2rem 1rem; text-align: center; background: rgba(255,255,255,0.02); cursor: pointer; transition: 0.2s; margin-bottom: 1.5rem; position: relative; }
        .file-drop-area:hover { border-color: var(--accent); background: rgba(212, 154, 106, 0.05); }
        .file-drop-area input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .file-msg { color: var(--text-muted); font-size: 0.9rem; pointer-events: none; }

        .modal-actions { display: flex; gap: 10px; margin-top: 1rem; }
        .modal-actions button { flex: 1; padding: 12px; border-radius: 12px; border: none; cursor: pointer; font-weight: 500; font-size: 0.95rem; transition: 0.2s; }
        .btn-cancel { background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--glass-border); }
        .btn-cancel:hover { background: rgba(255,255,255,0.1); }
        .btn-confirm { background: var(--accent); color: black; }
        .btn-confirm:hover { background: #e0ab82; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212, 154, 106, 0.3); }

        /* --- FLOATING EDIT BUTTON --- */
        .fab-container { position: fixed; bottom: 40px; right: 40px; z-index: 1000; }
        .fab { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(40px) saturate(250%); border: 1px solid rgba(255, 255, 255, 0.2); border-top: 1px solid rgba(255, 255, 255, 0.4); color: var(--text-main); padding: 12px 24px; border-radius: 30px; font-size: 0.9rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; display: flex; align-items: center; gap: 8px; box-shadow: 0 15px 30px rgba(0,0,0,0.5); transition: all 0.3s var(--ease-smooth); }
        .fab:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-3px); }
        .fab.active { background: var(--accent); color: var(--bg-base); border-color: transparent; }

    </style>
</head>
<body>

    <div class="ambient-glow"></div>
    <div class="ambient-glow glow-2"></div>

    <nav class="internal-nav">
        <button class="back-btn" onclick="window.location.href='index.html'">← Main OS</button>
        <div class="breadcrumbs" id="breadcrumb-container"></div>
        <div style="width: 70px;"></div>
    </nav>

    <main class="workspace">
        
        <div id="view-dashboard" class="view-layer active">
            <h1 class="page-title">Hardware & Systems</h1>
            <div class="page-subtitle">Project Matrix</div>

            <div class="section-header">Ongoing Operations</div>
            <div class="horizontal-track" id="ongoing-list">
                </div>

            <div class="section-header" style="margin-top: 3rem;">Future Initiatives</div>
            <div class="horizontal-track" id="future-list">
                 </div>

            <div class="section-header" style="margin-top: 3rem;">Archived Realizations</div>
            <div class="grid-completed" id="completed-list">
                </div>
        </div>

        <div id="view-project" class="view-layer">
            <h1 class="page-title" id="project-view-title">Project Name</h1>
            <div class="page-subtitle" id="project-view-desc">Project Description</div>
            
            <div class="horizontal-track" id="windows-list">
                </div>
        </div>

    </main>

    <div class="fab-container">
        <button class="fab" id="edit-fab" onclick="toggleEditMode()">
            <span id="fab-icon">✎</span> <span id="fab-text">Edit Mode</span>
        </button>
    </div>

    <div class="modal-overlay" id="glass-modal">
        <div class="modal-box">
            <h2 class="modal-title" id="modal-title">Add Item</h2>
            <input type="text" class="modal-input" id="modal-input-name" placeholder="Name / Title..." autocomplete="off"/>
            
            <input type="text" class="modal-input" id="modal-input-desc" placeholder="Brief Description..." autocomplete="off" style="display:none;"/>
            
            <select class="modal-select" id="modal-input-status" style="display:none;">
                <option value="ongoing">Status: Ongoing</option>
                <option value="future">Status: Future</option>
                <option value="completed">Status: Completed</option>
            </select>

            <input type="text" class="modal-input" id="modal-input-link" placeholder="URL Link (Optional)..." autocomplete="off" style="display:none;"/>
            
            <div id="modal-file-section" style="display: none;">
                <div style="text-align:center; font-size:0.8rem; color:var(--text-muted); margin-bottom:10px;">OR UPLOAD A FILE</div>
                <div class="file-drop-area">
                    <input type="file" id="modal-input-file" onchange="updateFileMsg(this)">
                    <span class="file-msg" id="file-msg-text">Click or drag file here to upload</span>
                </div>
            </div>

            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-confirm" onclick="confirmModal()">Confirm</button>
            </div>
        </div>
    </div>

   <script>
        let defaultProjectsDb = {
            "p1": { 
                title: "Micromouse Robot", desc: "Maze solver tuning VL53L1X array", 
                status: "ongoing", date: "", 
                windows: {
                    "w1": { title: "Hardware Specs", items: [{id: "i1", name: "VL53L1X Datasheet", type: "pdf", size: "1.1MB", url: null}] },
                    "w2": { title: "Logic Base", items: [{id: "i4", name: "GitHub Repo", type: "link", size: "URL", url: "https://github.com"}] }
                } 
            },
            "p2": { title: "Embedded OS Kernal", desc: "Custom RTOS for STM32 architecture", status: "future", date: "", windows: {} },
            "p3": { title: "Perovskite Sim", desc: "Emission color analysis and synthesis simulation", status: "completed", date: "14 JUN 2026", windows: { "w3": { title: "Results", items: [{id: "i5", name: "Final Report", type: "pdf", size: "4.5MB", url: null}] } } }
        };

        let db = JSON.parse(localStorage.getItem('core_os_projects_db')) || defaultProjectsDb;
        let currentState = { level: 'dashboard', activeProjectId: null, isEditing: false };
        let modalContext = { action: null, type: null, targetId: null, defaultStatus: 'ongoing' };

        /* ==========================================================
           CORE RENDER ENGINE
           ========================================================== */

        function render() {
            document.querySelectorAll('.view-layer').forEach(el => el.classList.remove('active'));
            document.getElementById(`view-${currentState.level}`).classList.add('active');
            
            const workspace = document.querySelector('.workspace');
            currentState.isEditing ? workspace.classList.add('edit-mode') : workspace.classList.remove('edit-mode');

            updateBreadcrumbs();
            updateFab();

            if (currentState.level === 'dashboard') renderDashboard();
            else if (currentState.level === 'project') renderProjectView();

            // Permanent cloud/browser sandbox storage save
            localStorage.setItem('core_os_projects_db', JSON.stringify(db));
        }

        function updateBreadcrumbs() {
            const bc = document.getElementById('breadcrumb-container');
            let html = `<span class="bc-link ${currentState.level === 'dashboard' ? 'bc-active' : ''}" onclick="navTo('dashboard')">Projects Hub</span>`;
            if (currentState.activeProjectId) {
                const p = db[currentState.activeProjectId];
                html += `<span class="bc-sep">/</span> <span class="bc-link bc-active">${p.title}</span>`;
            }
            bc.innerHTML = html;
        }

        function updateFab() {
            const fabText = document.getElementById('fab-text');
            const fab = document.getElementById('edit-fab');
            if (currentState.isEditing) { fabText.innerText = "Done Editing"; fab.classList.add('active'); } 
            else { fabText.innerText = "Edit Mode"; fab.classList.remove('active'); }
        }

        /* ==========================================================
           LAYER RENDERERS
           ========================================================== */

        function renderDashboard() {
            const ongoingContainer = document.getElementById('ongoing-list');
            const futureContainer = document.getElementById('future-list');
            const completedContainer = document.getElementById('completed-list');
            
            ongoingContainer.innerHTML = ''; futureContainer.innerHTML = ''; completedContainer.innerHTML = '';

            for (const [id, p] of Object.entries(db)) {
                let quickActions = '';
                
                if (p.status === 'ongoing') {
                    quickActions = `
                        <button class="btn-icon success" onclick="changeStatus('${id}', 'completed')" title="Mark Complete">✓</button>
                        <button class="btn-icon future" onclick="changeStatus('${id}', 'future')" title="Move to Future">⏳</button>
                    `;
                } else if (p.status === 'future') {
                    quickActions = `
                        <button class="btn-icon success" onclick="changeStatus('${id}', 'ongoing')" title="Start Project">▶</button>
                        <button class="btn-icon success" onclick="changeStatus('${id}', 'completed')" title="Mark Complete">✓</button>
                    `;
                } else if (p.status === 'completed') {
                    quickActions = `
                        <button class="btn-icon future" onclick="changeStatus('${id}', 'ongoing')" title="Reopen Project">↺</button>
                    `;
                }

                const controlsHtml = `
                    <div class="edit-controls" onclick="event.stopPropagation()">
                        <button class="btn-icon" onclick="openModal('project', 'edit', '${id}')" title="Edit Properties">✎</button>
                        ${quickActions}
                        <button class="btn-icon del" onclick="deleteItem('project', '${id}')" title="Delete">×</button>
                    </div>`;

                const dateHtml = p.status === 'completed' ? `<div class="card-date">REALIZED // ${p.date}</div>` : '';
                
                const cardHtml = `
                    <div class="glass-card" onclick="if(!currentState.isEditing) navTo('project', '${id}')">
                        <h3 class="card-title">${p.title}</h3>
                        <p class="card-desc">${p.desc}</p>
                        ${dateHtml}
                        ${controlsHtml}
                    </div>`;
                
                if (p.status === 'ongoing') ongoingContainer.innerHTML += cardHtml;
                else if (p.status === 'future') futureContainer.innerHTML += cardHtml;
                else completedContainer.innerHTML += cardHtml;
            }
            
            ongoingContainer.innerHTML += `<button class="add-card-btn" onclick="openModal('project', 'add', null, 'ongoing')">+ Initialize Ongoing</button>`;
            futureContainer.innerHTML += `<button class="add-card-btn" onclick="openModal('project', 'add', null, 'future')">+ Plan Future Project</button>`;

            if (completedContainer.innerHTML === '') completedContainer.innerHTML = `<div style="color:var(--text-muted); font-size:0.9rem; padding: 20px;">No archived projects yet.</div>`;
        }

        function renderProjectView() {
            const p = db[currentState.activeProjectId];
            document.getElementById('project-view-title').innerText = p.title;
            document.getElementById('project-view-desc').innerText = p.desc;

            const winContainer = document.getElementById('windows-list');
            winContainer.innerHTML = '';

            for (const [wId, w] of Object.entries(p.windows)) {
                let itemsHtml = '';
                w.items.forEach(item => {
                    const icon = item.type === 'pdf' ? '📄' : item.type === 'img' ? '🖼️' : item.type === 'link' ? '🔗' : '📝';
                    const viewAction = item.url ? `window.open('${item.url}', '_blank')` : `alert('Simulation: Open ${item.name}')`;
                    
                    itemsHtml += `
                        <div class="res-item">
                            <span class="res-icon">${icon}</span>
                            <div class="res-info">
                                <span class="res-name mono">${item.name}</span>
                                <span class="res-meta mono">${item.size}</span>
                            </div>
                            <button class="view-btn" onclick="${viewAction}">Open</button>
                            <div class="item-edit-controls">
                                <button class="btn-icon del" onclick="deleteItem('item', '${item.id}', '${wId}')" style="width:24px; height:24px;">×</button>
                            </div>
                        </div>`;
                });

                if(w.items.length === 0) itemsHtml = `<div style="color:var(--text-muted); font-size:0.8rem; text-align:center; padding:10px;">Window Empty</div>`;

                winContainer.innerHTML += `
                    <div class="window-panel">
                        <div class="window-header">
                            <span class="window-title">${w.title}</span>
                            <div class="item-edit-controls">
                                <button class="btn-icon" onclick="openModal('window', 'edit', '${wId}')" style="width:28px; height:28px;">✎</button>
                                <button class="btn-icon del" onclick="deleteItem('window', '${wId}')" style="width:28px; height:28px;">×</button>
                            </div>
                        </div>
                        <div class="window-content">${itemsHtml}</div>
                        <button class="add-btn" onclick="openModal('item', 'add', '${wId}')">+ Add Link / File</button>
                    </div>`;
            }

            winContainer.innerHTML += `<button class="add-card-btn" style="min-width: 350px;" onclick="openModal('window')">+ Deploy Window</button>`;
        }

        /* ==========================================================
           INTERACTIONS & MODAL LOGIC
           ========================================================== */

        function navTo(level, id = null) {
            currentState.level = level;
            if (id) currentState.activeProjectId = id;
            currentState.isEditing = false; 
            render();
        }

        function toggleEditMode() { currentState.isEditing = !currentState.isEditing; render(); }
        function generateId() { return '_' + Math.random().toString(36).substr(2, 9); }
        
        function formatBytes(bytes, decimals = 1) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024; const dm = decimals < 0 ? 0 : decimals; const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        }

        function changeStatus(id, newStatus) {
            db[id].status = newStatus;
            if (newStatus === 'completed') {
                db[id].date = new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }).toUpperCase();
            }
            render();
        }

        function updateFileMsg(input) {
            const msg = document.getElementById('file-msg-text');
            const nameInput = document.getElementById('modal-input-name');
            if (input.files && input.files.length > 0) {
                const file = input.files[0];
                msg.innerText = file.name + ` (${formatBytes(file.size)})`;
                if(nameInput.value === '') nameInput.value = file.name.split('.').slice(0, -1).join('.') || file.name;
            } else { msg.innerText = "Click or drag file here to upload"; }
        }

        function openModal(type, action = 'add', targetId = null, defaultStatus = 'ongoing') {
            modalContext = { action, type, targetId, defaultStatus };
            const modal = document.getElementById('glass-modal');
            const title = document.getElementById('modal-title');
            
            const nameIn = document.getElementById('modal-input-name');
            const descIn = document.getElementById('modal-input-desc');
            const statusIn = document.getElementById('modal-input-status');
            const linkIn = document.getElementById('modal-input-link');
            const fileSec = document.getElementById('modal-file-section');
            const fileIn = document.getElementById('modal-input-file');
            
            nameIn.value = ''; descIn.value = ''; linkIn.value = ''; fileIn.value = '';
            document.getElementById('file-msg-text').innerText = "Click or drag file here to upload";

            descIn.style.display = 'none'; statusIn.style.display = 'none'; linkIn.style.display = 'none'; fileSec.style.display = 'none';

            if (type === 'project') {
                title.innerText = action === 'add' ? "Initialize Project" : "Edit Project";
                descIn.style.display = 'block'; statusIn.style.display = 'block';
                if (action === 'edit') { 
                    nameIn.value = db[targetId].title; descIn.value = db[targetId].desc; statusIn.value = db[targetId].status;
                } else { statusIn.value = defaultStatus; }
            } 
            else if (type === 'window') {
                title.innerText = action === 'add' ? "Deploy New Window" : "Rename Window";
                if (action === 'edit') nameIn.value = db[currentState.activeProjectId].windows[targetId].title;
            } 
            else if (type === 'item') {
                title.innerText = "Attach Resource";
                linkIn.style.display = 'block'; fileSec.style.display = 'block';
            }
            modal.classList.add('active'); nameIn.focus();
        }

        function closeModal() { document.getElementById('glass-modal').classList.remove('active'); }

        function confirmModal() {
            const name = document.getElementById('modal-input-name').value.trim();
            if (!name) return alert("Please provide a name/title.");

            if (modalContext.action === 'add') {
                if (modalContext.type === 'project') {
                    const status = document.getElementById('modal-input-status').value;
                    const dateStr = status === 'completed' ? new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }).toUpperCase() : '';
                    db[generateId()] = { title: name, desc: document.getElementById('modal-input-desc').value.trim(), status: status, date: dateStr, windows: {} };
                } 
                else if (modalContext.type === 'window') {
                    db[currentState.activeProjectId].windows[generateId()] = { title: name, items: [] };
                } 
                else if (modalContext.type === 'item') {
                    const linkVal = document.getElementById('modal-input-link').value.trim();
                    const fileInput = document.getElementById('modal-input-file');
                    
                    if (fileInput.files && fileInput.files.length > 0) {
                        const file = fileInput.files[0];
                        const reader = new FileReader();
                        reader.onload = function (e) {
                            db[currentState.activeProjectId].windows[modalContext.targetId].items.push({
                                id: generateId(), name: name, type: file.type.includes('pdf') ? 'pdf' : 'img', size: formatBytes(file.size), url: e.target.result
                            });
                            render();
                        };
                        reader.readAsDataURL(file);
                        closeModal();
                        return;
                    } else if (linkVal) {
                        db[currentState.activeProjectId].windows[modalContext.targetId].items.push({
                            id: generateId(), name: name, type: 'link', size: 'URL', url: linkVal
                        });
                    }
                }
            } 
            else if (modalContext.action === 'edit') {
                if (modalContext.type === 'project') {
                    const oldStatus = db[modalContext.targetId].status;
                    const newStatus = document.getElementById('modal-input-status').value;
                    db[modalContext.targetId].title = name;
                    db[modalContext.targetId].desc = document.getElementById('modal-input-desc').value.trim();
                    if (oldStatus !== newStatus) changeStatus(modalContext.targetId, newStatus);
                } 
                else if (modalContext.type === 'window') {
                    db[currentState.activeProjectId].windows[modalContext.targetId].title = name;
                }
            }
            closeModal(); render();
        }

        function deleteItem(type, id, parentId = null) {
            if(!confirm("Erase this permanently?")) return;
            if (type === 'project') delete db[id];
            else if (type === 'window') delete db[currentState.activeProjectId].windows[id];
            else if (type === 'item') {
                let items = db[currentState.activeProjectId].windows[parentId].items;
                db[currentState.activeProjectId].windows[parentId].items = items.filter(i => i.id !== id);
            }
            render();
        }

        // Initialize App
        render();
    </script>
</body>
