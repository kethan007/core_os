<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORE_OS // Academic Subsystem</title>
    <style>
        /* =========================================
           ULTRA-GLOSSY ACADEMIC SUBSYSTEM v2.0
           ========================================= */
        :root {
            --bg-base: #050404; 
            --text-main: #ffffff; 
            --text-muted: #a39589;
            --accent: #d49a6a; 
            --danger: #d46a6a;
            
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-highlight: rgba(255, 255, 255, 0.2);
            
            --ease-smooth: cubic-bezier(0.25, 1, 0.5, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing: antialiased; }
        .mono { font-family: 'Courier New', Courier, monospace; }

        body { background-color: var(--bg-base); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

        /* --- AMBIENT LIGHTS --- */
        .ambient-glow { position: fixed; top: -10%; left: -10%; width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(212, 154, 106, 0.12) 0%, transparent 60%); filter: blur(80px); z-index: 0; pointer-events: none; }
        .glow-2 { top: auto; bottom: -20%; left: auto; right: -10%; background: radial-gradient(circle, rgba(60, 90, 140, 0.12) 0%, transparent 60%); }

        /* --- NAVIGATION / BREADCRUMBS --- */
        .internal-nav {
            padding: 1.5rem 5%; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(5, 4, 4, 0.5); backdrop-filter: blur(30px) saturate(150%); -webkit-backdrop-filter: blur(30px) saturate(150%);
            position: sticky; top: 0; z-index: 100;
        }
        .back-btn { background: transparent; border: none; font-size: 0.9rem; cursor: pointer; color: var(--text-muted); transition: color 0.3s ease; }
        .back-btn:hover { color: var(--text-main); }
        .breadcrumbs { font-size: 0.85rem; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; display: flex; align-items: center; justify-content: center;}
        .bc-link { color: var(--text-muted); cursor: pointer; transition: color 0.2s; padding: 4px 8px; border-radius: 6px; }
        .bc-link:hover { color: var(--text-main); background: rgba(255,255,255,0.05); }
        .bc-active { color: var(--accent); }
        .bc-sep { margin: 0 4px; color: rgba(255,255,255,0.2); }

        /* --- MAIN WORKSPACE --- */
        .workspace { max-width: 1200px; margin: 0 auto; padding: 4rem 5% 8rem 5%; position: relative; z-index: 10; }
        
        .view-layer { display: none; opacity: 0; transform: translateY(20px); transition: all 0.4s var(--ease-smooth); }
        .view-layer.active { display: block; opacity: 1; transform: translateY(0); }

        /* Centered Titles */
        .page-title { 
            font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 300; letter-spacing: -0.03em; 
            margin-bottom: 3rem; text-align: center; text-shadow: 0 4px 30px rgba(0,0,0,0.8);
        }

        /* --- GLOSSY PANELS & LISTS --- */
        .panel {
            background: rgba(255, 255, 255, 0.015); backdrop-filter: blur(40px) saturate(200%); -webkit-backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid var(--glass-border); border-top: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            border-radius: 24px; padding: 2.5rem; transition: all 0.4s var(--ease-smooth);
        }
        .panel-header { font-size: 0.95rem; color: var(--text-main); margin-bottom: 1.5rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 1rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.8; text-align: center;}

        .list-item { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 18px 24px; border: 1px solid var(--glass-border); margin-bottom: 12px; 
            background: rgba(255, 255, 255, 0.02); border-radius: 16px; cursor: pointer;
            transition: all 0.3s ease; position: relative; overflow: hidden;
        }
        .list-item:hover { border-color: rgba(255,255,255,0.25); background: rgba(255, 255, 255, 0.06); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        
        .item-name { font-size: 1.15rem; font-weight: 400; flex: 1; }
        .item-meta { font-size: 0.85rem; color: var(--text-muted); }

        /* --- RESOURCE GRID (3 WINDOWS) --- */
        .resource-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; }
        @media (max-width: 900px) { .resource-grid { grid-template-columns: 1fr; } }
        
        .resource-item { 
            font-size: 0.9rem; display: flex; align-items: center; gap: 12px; padding: 14px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.2s; border-radius: 12px;
            background: rgba(255,255,255,0.01); margin-bottom: 8px; border: 1px solid transparent;
        }
        .resource-item:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.05); }
        .icon { font-size: 1.4rem; }
        
        .resource-details { flex: 1; display: flex; flex-direction: column; }
        .resource-size { font-size: 0.7rem; color: var(--accent); margin-top: 2px; }

        .view-btn { background: rgba(255,255,255,0.1); border: none; color: white; padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; transition: 0.2s; font-weight: 500;}
        .view-btn:hover { background: var(--accent); color: black; }

        /* --- EDIT MODE CONTROLS --- */
        .edit-controls { display: none; gap: 8px; margin-left: 15px; border-left: 1px solid var(--glass-border); padding-left: 15px; }
        .edit-mode .edit-controls { display: flex; }
        .edit-mode .list-item:hover { transform: none; box-shadow: none; }
        .edit-mode .view-btn { display: none; } /* Hide view button while editing */

        .btn-icon { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: var(--text-main); border-radius: 8px; width: 32px; height: 32px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: all 0.2s; }
        .btn-icon:hover { background: rgba(255,255,255,0.15); transform: scale(1.05); }
        .btn-icon.del:hover { background: rgba(212, 106, 106, 0.3); border-color: var(--danger); color: var(--danger); }

        .add-btn { 
            width: 100%; padding: 16px; margin-top: 10px; background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.2); 
            color: var(--text-muted); border-radius: 16px; cursor: pointer; transition: all 0.2s; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.1em;
            display: none; justify-content: center; align-items: center; gap: 10px;
        }
        .edit-mode .add-btn { display: flex; }
        .add-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-main); border-color: var(--accent); }

        /* --- CUSTOM GLASS MODAL (NOTION-STYLE UPLOAD) --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); z-index: 9999;
            display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        
        .modal-box {
            background: rgba(15, 12, 11, 0.8); backdrop-filter: blur(50px) saturate(200%); -webkit-backdrop-filter: blur(50px) saturate(200%);
            border: 1px solid rgba(255,255,255,0.15); border-top: 1px solid rgba(255,255,255,0.3); box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            border-radius: 24px; padding: 2rem; width: 90%; max-width: 450px; transform: translateY(20px) scale(0.95); transition: all 0.3s var(--ease-smooth);
        }
        .modal-overlay.active .modal-box { transform: translateY(0) scale(1); }

        .modal-title { font-weight: 300; font-size: 1.5rem; margin-bottom: 1.5rem; text-align: center; }
        
        .modal-input {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); color: white;
            padding: 14px; border-radius: 12px; font-size: 1rem; margin-bottom: 1.5rem; outline: none; transition: border 0.2s;
        }
        .modal-input:focus { border-color: var(--accent); }

        .file-drop-area {
            border: 2px dashed rgba(255,255,255,0.2); border-radius: 12px; padding: 2rem 1rem; text-align: center;
            background: rgba(255,255,255,0.02); cursor: pointer; transition: 0.2s; margin-bottom: 1.5rem; position: relative;
        }
        .file-drop-area:hover { border-color: var(--accent); background: rgba(212, 154, 106, 0.05); }
        .file-drop-area input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .file-msg { color: var(--text-muted); font-size: 0.9rem; pointer-events: none; }
        
        .modal-actions { display: flex; gap: 10px; }
        .modal-actions button { flex: 1; padding: 12px; border-radius: 12px; border: none; cursor: pointer; font-weight: 500; font-size: 0.95rem; transition: 0.2s; }
        .btn-cancel { background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--glass-border); }
        .btn-cancel:hover { background: rgba(255,255,255,0.1); }
        .btn-confirm { background: var(--accent); color: black; }
        .btn-confirm:hover { background: #e0ab82; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212, 154, 106, 0.3); }

        /* --- FLOATING EDIT BUTTON --- */
        .fab-container { position: fixed; bottom: 40px; right: 40px; z-index: 1000; }
        .fab {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(40px) saturate(250%);
            border: 1px solid rgba(255, 255, 255, 0.2); border-top: 1px solid rgba(255, 255, 255, 0.4);
            color: var(--text-main); padding: 12px 24px; border-radius: 30px; font-size: 0.9rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em;
            cursor: pointer; display: flex; align-items: center; gap: 8px; box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            transition: all 0.3s var(--ease-smooth);
        }
        .fab:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-3px); }
        .fab.active { background: var(--accent); color: var(--bg-base); border-color: transparent; }

    </style>
</head>
<body>

    <div class="ambient-glow"></div>
    <div class="ambient-glow glow-2"></div>

    <nav class="internal-nav">
        <button class="back-btn" onclick="window.history.back()">← Main OS</button>
        <div class="breadcrumbs" id="breadcrumb-container"></div>
        <div style="width: 70px;"></div> </nav>

    <main class="workspace">
        
        <div id="view-semesters" class="view-layer active">
            <h1 class="page-title">Academic Timeline</h1>
            <div class="panel" id="semesters-list"></div>
            <button class="add-btn" onclick="openModal('semester')">+ Add New Semester</button>
        </div>

        <div id="view-subjects" class="view-layer">
            <h1 class="page-title" id="subject-view-title">Subjects</h1>
            <div class="panel" id="subjects-list"></div>
            <button class="add-btn" onclick="openModal('subject')">+ Add New Subject</button>
        </div>

        <div id="view-resources" class="view-layer">
            <h1 class="page-title" id="resource-view-title">Resources</h1>
            
            <div class="resource-grid">
                <div class="panel">
                    <h3 class="panel-header">Lecture Slides</h3>
                    <div id="list-slides"></div>
                    <button class="add-btn" onclick="openModal('resource', 'slides')">+ Upload PDF / Deck</button>
                </div>
                <div class="panel">
                    <h3 class="panel-header">Personal Notes</h3>
                    <div id="list-notes"></div>
                    <button class="add-btn" onclick="openModal('resource', 'notes')">+ Upload Doc / Note</button>
                </div>
                <div class="panel">
                    <h3 class="panel-header">Miscellaneous</h3>
                    <div id="list-misc"></div>
                    <button class="add-btn" onclick="openModal('resource', 'misc')">+ Upload File / Photo</button>
                </div>
            </div>
        </div>

    </main>

    <div class="fab-container">
        <button class="fab" id="edit-fab" onclick="toggleEditMode()">
            <span id="fab-icon">✎</span> <span id="fab-text">Edit Mode</span>
        </button>
    </div>

    <div class="modal-overlay" id="glass-modal">
        <div class="modal-box">
            <h2 class="modal-title" id="modal-title">Add Item</h2>
            <input type="text" class="modal-input" id="modal-input-name" placeholder="Item Name..." autocomplete="off"/>
            
            <div id="modal-file-section" style="display: none;">
                <div class="file-drop-area">
                    <input type="file" id="modal-input-file" onchange="updateFileMsg(this)">
                    <span class="file-msg" id="file-msg-text">Click or drag file here to upload</span>
                </div>
            </div>

            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-confirm" onclick="confirmModal()">Confirm</button>
            </div>
        </div>
    </div>

<script>
        // 1. ATTEMPT TO LOAD EXISTING DATA FROM THE BROWSER, ELSE USE TEMPLATE
        let defaultAcademicDb = {
            "sem4": {
                name: "Semester 04",
                subjects: {
                    "sub_ece": { 
                        name: "Embedded Systems", 
                        resources: {
                            slides: [{ id: "r1", name: "ARM_Cortex_M4_Arch", type: "pdf", size: "2.4 MB", url: null }],
                            notes: [{ id: "r2", name: "Motor_Control_Scratchpad", type: "doc", size: "14 KB", url: null }],
                            misc: [{ id: "r3", name: "VL53L1X_Datasheet", type: "pdf", size: "1.1 MB", url: null }]
                        }
                    },
                    "sub_sig": { 
                        name: "Signal Processing", 
                        resources: { slides: [], notes: [], misc: [] }
                    }
                }
            }
        };

        let db = JSON.parse(localStorage.getItem('core_os_academic_db')) || defaultAcademicDb;
        let currentState = { level: 'semesters', activeSemId: null, activeSubId: null, isEditing: false };
        let modalContext = { action: null, type: null, category: null, editId: null };

        /* ==========================================================
           CORE RENDER ENGINE
           ========================================================== */

        function render() {
            document.querySelectorAll('.view-layer').forEach(el => el.classList.remove('active'));
            document.getElementById(`view-${currentState.level}`).classList.add('active');
            
            const workspace = document.querySelector('.workspace');
            currentState.isEditing ? workspace.classList.add('edit-mode') : workspace.classList.remove('edit-mode');

            updateBreadcrumbs();
            updateFab();

            if (currentState.level === 'semesters') renderSemesters();
            else if (currentState.level === 'subjects') renderSubjects();
            else if (currentState.level === 'resources') renderResources();

            // CRUCIAL: Save the entire state changes to local browser memory automatically
            localStorage.setItem('core_os_academic_db', JSON.stringify(db));
        }

        function updateBreadcrumbs() {
            const bc = document.getElementById('breadcrumb-container');
            let html = `<span class="bc-link ${currentState.level === 'semesters' ? 'bc-active' : ''}" onclick="navTo('semesters')">Academic Core</span>`;
            
            if (currentState.activeSemId && db[currentState.activeSemId]) {
                const active = currentState.level === 'subjects' ? 'bc-active' : '';
                html += `<span class="bc-sep">/</span> <span class="bc-link ${active}" onclick="navTo('subjects')">${db[currentState.activeSemId].name}</span>`;
            }
            if (currentState.activeSubId && db[currentState.activeSemId].subjects[currentState.activeSubId]) {
                html += `<span class="bc-sep">/</span> <span class="bc-link bc-active">${db[currentState.activeSemId].subjects[currentState.activeSubId].name}</span>`;
            }
            bc.innerHTML = html;
        }

        function updateFab() {
            const fabText = document.getElementById('fab-text');
            const fab = document.getElementById('edit-fab');
            if (currentState.isEditing) {
                fabText.innerText = "Done Editing"; fab.classList.add('active');
            } else {
                fabText.innerText = "Edit Mode"; fab.classList.remove('active');
            }
        }

        /* ==========================================================
           LAYER RENDERERS
           ========================================================== */

        function renderSemesters() {
            const container = document.getElementById('semesters-list');
            container.innerHTML = '';
            for (const [id, sem] of Object.entries(db)) {
                const subCount = Object.keys(sem.subjects).length;
                container.innerHTML += `
                    <div class="list-item" onclick="if(!currentState.isEditing) navTo('subjects', '${id}')">
                        <div class="item-name">${sem.name}</div>
                        <div class="item-meta mono">// ${subCount} Modules</div>
                        <div class="edit-controls" onclick="event.stopPropagation()">
                            <button class="btn-icon" onclick="openModal('semester', null, 'edit', '${id}')">✎</button>
                            <button class="btn-icon del" onclick="deleteItem('semester', '${id}')">×</button>
                        </div>
                    </div>`;
            }
            if(Object.keys(db).length === 0) container.innerHTML = `<div class="item-meta" style="text-align:center;">No data. Click below to initialize.</div>`;
        }

        function renderSubjects() {
            const sem = db[currentState.activeSemId];
            document.getElementById('subject-view-title').innerText = sem.name;
            const container = document.getElementById('subjects-list');
            container.innerHTML = '';

            for (const [id, sub] of Object.entries(sem.subjects)) {
                let totalRes = sub.resources.slides.length + sub.resources.notes.length + sub.resources.misc.length;
                container.innerHTML += `
                    <div class="list-item" onclick="if(!currentState.isEditing) navTo('resources', null, '${id}')">
                        <div class="item-name">${sub.name}</div>
                        <div class="item-meta mono">// ${totalRes} Files</div>
                        <div class="edit-controls" onclick="event.stopPropagation()">
                            <button class="btn-icon" onclick="openModal('subject', null, 'edit', '${id}')">✎</button>
                            <button class="btn-icon del" onclick="deleteItem('subject', '${id}')">×</button>
                        </div>
                    </div>`;
            }
            if(Object.keys(sem.subjects).length === 0) container.innerHTML = `<div class="item-meta" style="text-align:center;">No subjects mapped.</div>`;
        }

        function renderResources() {
            const sub = db[currentState.activeSemId].subjects[currentState.activeSubId];
            document.getElementById('resource-view-title').innerText = sub.name;
            
            ['slides', 'notes', 'misc'].forEach(category => {
                const container = document.getElementById(`list-${category}`);
                container.innerHTML = '';
                
                sub.resources[category].forEach(res => {
                    const icon = res.type === 'pdf' ? '📄' : res.type === 'img' ? '🖼️' : '📝';
                    const viewAction = res.url ? `window.open('${res.url}', '_blank')` : `alert('Simulation: Open file ${res.name}')`;
                    
                    container.innerHTML += `
                        <div class="resource-item">
                            <span class="icon">${icon}</span>
                            <div class="resource-details">
                                <span class="item-name mono" style="font-size:0.9rem;">${res.name}</span>
                                <span class="resource-size mono">${res.size}</span>
                            </div>
                            <button class="view-btn" onclick="${viewAction}">View</button>
                            <div class="edit-controls">
                                <button class="btn-icon" onclick="openModal('resource', '${category}', 'edit', '${res.id}')" style="width:28px; height:28px;">✎</button>
                                <button class="btn-icon del" onclick="deleteItem('resource', '${res.id}', '${category}')" style="width:28px; height:28px;">×</button>
                            </div>
                        </div>`;
                });
            });
        }

        /* ==========================================================
           INTERACTIONS & CUSTOM MODAL LOGIC
           ========================================================== */

        function navTo(level, semId = null, subId = null) {
            currentState.level = level;
            if (semId) currentState.activeSemId = semId;
            if (subId) currentState.activeSubId = subId;
            currentState.isEditing = false; 
            render();
        }

        function toggleEditMode() { currentState.isEditing = !currentState.isEditing; render(); }
        function generateId() { return '_' + Math.random().toString(36).substr(2, 9); }

        function formatBytes(bytes, decimals = 1) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024; const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        }

        function updateFileMsg(input) {
            const msg = document.getElementById('file-msg-text');
            const nameInput = document.getElementById('modal-input-name');
            if (input.files && input.files.length > 0) {
                const file = input.files[0];
                msg.innerText = file.name + ` (${formatBytes(file.size)})`;
                if(nameInput.value === '') {
                    nameInput.value = file.name.split('.').slice(0, -1).join('.') || file.name;
                }
            } else {
                msg.innerText = "Click or drag file here to upload";
            }
        }

        function openModal(type, category = null, action = 'add', editId = null) {
            modalContext = { action, type, category, editId };
            const modal = document.getElementById('glass-modal');
            const title = document.getElementById('modal-title');
            const nameInput = document.getElementById('modal-input-name');
            const fileSec = document.getElementById('modal-file-section');
            const fileInput = document.getElementById('modal-input-file');
            
            nameInput.value = '';
            fileInput.value = '';
            document.getElementById('file-msg-text').innerText = "Click or drag file here to upload";

            if (action === 'add') {
                title.innerText = type === 'resource' ? "Upload File" : `New ${type.charAt(0).toUpperCase() + type.slice(1)}`;
                fileSec.style.display = type === 'resource' ? 'block' : 'none';
            } else if (action === 'edit') {
                title.innerText = "Rename Item";
                fileSec.style.display = 'none';
                
                let obj;
                if (type === 'semester') obj = db[editId];
                else if (type === 'subject') obj = db[currentState.activeSemId].subjects[editId];
                else obj = db[currentState.activeSemId].subjects[currentState.activeSubId].resources[category].find(r => r.id === editId);
                if(obj) nameInput.value = obj.name;
            }

            modal.classList.add('active');
            nameInput.focus();
        }

        function closeModal() { document.getElementById('glass-modal').classList.remove('active'); }

        function confirmModal() {
            const name = document.getElementById('modal-input-name').value.trim();
            const fileInput = document.getElementById('modal-input-file');
            if (!name) return alert("Please provide a name.");

            if (modalContext.action === 'add') {
                if (modalContext.type === 'semester') {
                    db[generateId()] = { name: name, subjects: {} };
                } 
                else if (modalContext.type === 'subject') {
                    db[currentState.activeSemId].subjects[generateId()] = { name: name, resources: { slides: [], notes: [], misc: [] } };
                }
                else if (modalContext.type === 'resource') {
                    let fileUrl = null; let fileSizeStr = "Unknown Size"; let fileExt = "doc";

                    if (fileInput.files && fileInput.files.length > 0) {
                        const file = fileInput.files[0];
                        
                        // NOTE: Converts uploaded file layout to an internal temporary string pointer
                        const reader = new FileReader();
                        reader.onload = function (e) {
                            db[currentState.activeSemId].subjects[currentState.activeSubId].resources[modalContext.category].push({
                                id: generateId(), name: name, type: file.type.includes('pdf') ? 'pdf' : file.type.includes('image') ? 'img' : 'doc', size: formatBytes(file.size), url: e.target.result
                            });
                            render();
                        };
                        reader.readAsDataURL(file);
                        closeModal();
                        return;
                    }

                    db[currentState.activeSemId].subjects[currentState.activeSubId].resources[modalContext.category].push({
                        id: generateId(), name: name, type: fileExt, size: fileSizeStr, url: fileUrl
                    });
                }
            } 
            else if (modalContext.action === 'edit') {
                let obj;
                if (modalContext.type === 'semester') obj = db[modalContext.editId];
                else if (modalContext.type === 'subject') obj = db[currentState.activeSemId].subjects[modalContext.editId];
                else obj = db[currentState.activeSemId].subjects[currentState.activeSubId].resources[modalContext.category].find(r => r.id === modalContext.editId);
                if(obj) obj.name = name;
            }

            closeModal();
            render();
        }

        function deleteItem(type, id, category = null) {
            if(!confirm("Are you sure you want to delete this permanently?")) return;

            if (type === 'semester') delete db[id];
            else if (type === 'subject') delete db[currentState.activeSemId].subjects[id];
            else if (type === 'resource') {
                let resArray = db[currentState.activeSemId].subjects[currentState.activeSubId].resources[category];
                db[currentState.activeSemId].subjects[currentState.activeSubId].resources[category] = resArray.filter(r => r.id !== id);
            }
            render();
        }

        // Initialize App
        render();
    </script>
</body>
</html>
